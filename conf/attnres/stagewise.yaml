# @package _global_
# AttnRes on all blocks with stage-wise history
attnres:
  enabled: true
  mode: stagewise
  history_len: 2
  temperature: 1.0
  gate_init: 0.0
  score_fn: gap_linear
  gate_type: scalar
  detach_history: false
  fusion_mode: attention
  share_proj: false
  bottleneck_start_idx: 2
  decoder_enabled: false
