# @package _global_
# wandb enabled
wandb:
  enabled: true
  project: attnresvid
  entity: null        # null = default wandb entity (from CLI login)
  run_name: null      # null = auto-generated by wandb
  tags: []            # e.g. ["bottleneck", "exp1"]
  notes: ""
  log_images: true    # log preview images to wandb
  log_gate_values: true  # log AttnRes gate values each step
  watch_model: false  # call wandb.watch() (adds gradient histograms, heavy)
  watch_log_freq: 100
